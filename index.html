<!DOCTYPE html>
<html>
<head>
    <title>Calendar with Datepicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            border: 1px solid #333;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            background: #1a1a1a;
        }

        /* Datepicker header inside container */
        .datepicker-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .datepicker-header input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: #e0e0e0;
            font-size: 14px;
        }

        .datepicker-header input::placeholder {
            color: #666;
        }

        .datepicker-header button {
            background: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .datepicker-header button:hover {
            background: #00ffcc33;
        }

        /* Calendar header (month + arrows) */
        .row0 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ffcc;
            font-size: 18px;
        }

        .row0 span {
            margin: 0 10px;
            cursor: pointer;
        }

        .row0 span:hover {
            color: #fff;
        }

        /* Weekdays row */
        .weekdays {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }

        .weekdays div {
            flex: 1;
            text-align: center;
            font-weight: bold;
            color: #00ffcc;
        }

        /* Date rows */
        .row1, .row2, .row3, .row4, .row5, .row6 {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
        }

        .row1 div, .row2 div, .row3 div, .row4 div, .row5 div, .row6 div {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            background: #252525;
            border-radius: 8px;
            color: #e0e0e0;
        }

        .empty {
            background: transparent !important;
            border: 1px dashed #444;
        }

        .row div:hover {
            background: #00ffcc33;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Input + Button at the very top of container -->
    <div class="datepicker-header">
        <input type="text" placeholder="dd/mm/yy">
        <button>📅</button>
    </div>

    <!-- Month header -->
    <div class="row0">
        <span>《</span>
        <span>May 2026</span>
        <span>》</span>
    </div>

    <!-- Weekdays -->
    <div class="weekdays">
        <div>S</div>
        <div>M</div>
        <div>T</div>
        <div>W</div>
        <div>T</div>
        <div>F</div>
        <div>S</div>
    </div>

    <!-- Dates -->
    <div class="row1">
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div>1</div>
        <div>2</div>
    </div>

    <div class="row2">
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </div>

    <div class="row3">
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>
        <div>14</div>
        <div>15</div>
        <div>16</div>
    </div>

    <div class="row4">
        <div>17</div>
        <div>18</div>
        <div>19</div>
        <div>20</div>
        <div>21</div>
        <div>22</div>
        <div>23</div>
    </div>

    <div class="row5">
        <div>24</div>
        <div>25</div>
        <div>26</div>
        <div>27</div>
        <div>28</div>
        <div>29</div>
        <div>30</div>
    </div>

    <div class="row6">
        <div>31</div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>
    </div>
</div>

</body>
</html>
